# ============================================================
#  Gera a animação da "cobrinha" das contribuições.
#  Onde colocar este arquivo:
#    .github/workflows/snake.yml   (dentro do repo NicolleFelixx)
#  Depois é só esperar (ou rodar manualmente em Actions).
# ============================================================
name: Gerar animacao da cobrinha

on:
  schedule:
    - cron: "0 */12 * * *"   # roda a cada 12h
  workflow_dispatch:          # permite rodar manualmente
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Gerar SVGs da cobrinha
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Publicar no branch output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
